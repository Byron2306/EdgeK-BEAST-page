name: Deploy BEAST Commons to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - app/frontend/commons.html
      - app/cli/assets/**
      - seeds/ui_runtime/**
      - BEAST_mascot-removebg-preview.png
      - BEAST__Inference_Economy.mp4
      - BEAST_INFERENCE_INVERSION.pptx
      - .github/workflows/deploy-commons-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static Commons site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/beast-assets _site/commons-media

          cp app/frontend/commons.html _site/index.html

          if [ -d app/cli/assets ]; then
            cp -R app/cli/assets/. _site/beast-assets/
          fi

          [ ! -f BEAST_mascot-removebg-preview.png ] || cp BEAST_mascot-removebg-preview.png _site/commons-media/beast-logo.png
          [ ! -f BEAST__Inference_Economy.mp4 ] || cp BEAST__Inference_Economy.mp4 _site/commons-media/inference-economy.mp4
          [ ! -f BEAST_INFERENCE_INVERSION.pptx ] || cp BEAST_INFERENCE_INVERSION.pptx _site/commons-media/inference-inversion.pptx

          # Copy seeds/ui_runtime for UI runtime initialization
          if [ -d seeds/ui_runtime ]; then
            cp -R seeds/ui_runtime _site/seeds/
          fi

          # GitHub project Pages lives under /EdgeK-BEAST/, so root-absolute
          # asset URLs must become document-relative URLs.
          python - <<'PY'
          from pathlib import Path
          page = Path('_site/index.html')
          html = page.read_text(encoding='utf-8')
          html = html.replace('"/beast-assets/', '"./beast-assets/')
          html = html.replace("'/beast-assets/", "'./beast-assets/")
          html = html.replace('"/commons-media/', '"./commons-media/')
          html = html.replace("'/commons-media/", "'./commons-media/")
          page.write_text(html, encoding='utf-8')
          PY

          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
